<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Just This Lab</title>
<meta name="description" content="A super‑minimal homepage with a centered image and an email link." />
<style>
:root {
--bg: #0b0c0f;
--fg: #e8e8e8;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
margin: 0;
background: var(--bg);
color: var(--fg);
display: grid;
place-items: center;
font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Noto Sans, "Apple Color Emoji", "Segoe UI Emoji";
}
main {
width: 100%;
height: 100%;
display: grid;
place-items: center;
padding: 16px;
}
/* Centered, responsive hero image */
.hero {
max-width: min(92vw, 1200px);
max-height: 82vh;
width: auto;
height: auto;
object-fit: contain;
display: block;
user-select: none;
}
/* Bottom-right email link */
.email {
position: fixed;
right: 20px;
bottom: 16px;
padding: 10px 12px;
color: var(--fg);
text-decoration: none;
font-weight: 600;
border-radius: 10px;
background: rgba(255, 255, 255, 0.06);
border: 1px solid rgba(255, 255, 255, 0.08);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
}
.email:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.12); }
.email:active { transform: translateY(0); }
</style>
</head>
<body>
<main aria-label="Main content">
<!-- Replace `hero.jpg` with your image file placed next to this HTML, or a full URL -->
<img class="hero" src="hero.jpg" alt="Site hero image" loading="eager" />


<!-- Replace the address below with yours -->
<a class="email" href="mailto:justthislab@gmail.com">justthislab@gmail.com</a>
</main>
</body>
</html>
